{% extends 'core/base.html' %}
{% block content %}
  <h2>Upload Report</h2>
  <div class="card" style="max-width: 420px;">
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      {{ form.as_p }}
      <button class="btn" type="submit">Upload</button>
    </form>
  </div>
{% endblock %}
