<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body>
  <h2>Invoice</h2>
  <p>Appointment ID: APT-{{ invoice.appointment.id }}</p>
  <p>Patient: {{ invoice.appointment.patient.get_full_name }}</p>
  <p>Doctor: Dr. {{ invoice.appointment.doctor.get_full_name }}</p>
  <p>Doctor Fee: ₹ {{ invoice.doctor_fee }}</p>
  <p>Service Charge: ₹ {{ invoice.service_charge }}</p>
  <h3>Total: ₹ {{ invoice.total }}</h3>
</body>
</html>
