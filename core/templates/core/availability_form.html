{% extends 'core/base.html' %}
{% block content %}
  <div class="section-title">
    <h2>Add Availability Slot</h2>
    <p>Define consultation hours so patients can book only valid time windows.</p>
  </div>
  <div class="card reveal" style="max-width: 560px;">
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button class="btn" type="submit">Save Slot</button>
    </form>
  </div>
{% endblock %}
